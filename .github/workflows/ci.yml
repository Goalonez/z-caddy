name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.14.0

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build default archive
        run: ./scripts/build.sh

      - name: Load image archive
        run: docker load -i "$(ls dist/*.tar)"

      - name: Verify Cloudflare module
        run: docker run --rm z-caddy:latest caddy list-modules | grep 'dns.providers.cloudflare'
