name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build default archive
        run: ./scripts/build.sh

      - name: Load image archive
        run: docker load -i "$(ls dist/*.tar)"

      - name: Verify Cloudflare module
        run: docker run --rm z-caddy:latest caddy list-modules | grep 'dns.providers.cloudflare'
